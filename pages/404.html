<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" href="../assets/image/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/erro.css" />
  <title>Oops! Algo deu errado</title>
</head>

<body>
  <div class="hearts-container" id="hearts-container"></div>

  <main class="error-card">
    <div class="card-pattern"></div>

    <div class="error-content">
      <div class="sad-hearts">
        <svg viewBox="0 0 100 60" fill="none" xmlns="http://www.w3.org/2000/svg" class="sad-hearts-svg">
          <g transform="translate(10, 10)">
            <path
              d="M20 36.35l-2.45-2.22C7.4 26.36 2 21.28 2 15.5 2 10.42 6.42 6 11.5 6c2.74 0 5.41 1.81 6.5 4.09C19.09 7.81 21.76 6 24.5 6 29.58 6 34 10.42 34 15.5c0 5.78-5.4 10.86-15.55 18.64L18 36.35z"
              fill="#d65757" />
            <path d="M12 22 Q 18 26, 24 22" stroke="#441111" stroke-width="1.5" fill="none" opacity="0.6" />
          </g>
          <g transform="translate(45, 10)">
            <path
              d="M20 36.35l-2.45-2.22C7.4 26.36 2 21.28 2 15.5 2 10.42 6.42 6 11.5 6c2.74 0 5.41 1.81 6.5 4.09C19.09 7.81 21.76 6 24.5 6 29.58 6 34 10.42 34 15.5c0 5.78-5.4 10.86-15.55 18.64L18 36.35z"
              fill="#b14747" />
            <path d="M12 22 Q 18 26, 24 22" stroke="#441111" stroke-width="1.5" fill="none" opacity="0.6" />
            <circle cx="28" cy="22" r="2.5" fill="#a5d8ff" opacity="0.8">
              <animate attributeName="cy" from="22" to="34" dur="2s" repeatCount="infinite" />
              <animate attributeName="opacity" from="0.8" to="0" dur="2s" repeatCount="infinite" />
            </circle>
          </g>
        </svg>
      </div>

      <h1 class="error-title">Oops, algo deu errado.</h1>

      <div class="error-message">
        <p>O GPS do meu coração não conseguiu encontrar essa página "Não". Parece que você escolheu um caminho
          inexistente!</p>
      </div>

      <div class="error-actions">
        <button class="btn-retry" onclick="location.href='index.html'">
          Tentar Novamente
        </button>
        <button class="btn-report" onclick="location.href='teamo.html'">
          Apenas dizer sim
        </button>
      </div>

      <div class="error-footer">
        <p>Mas nosso amor resolve tudo.</p>
        <p>Com todo o meu amor.</p>
      </div>
    </div>
  </main>

  <script type="module" src="../assets/js/main.js"></script>
</body>

</html>
